server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail-positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: crm-api-file
    static_configs:
      - targets:
          - localhost
        labels:
          job: api
          service: api
          env: ${MONITORING_ENV}
          __path__: /var/log/crm/api.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            statusCode: statusCode
            path: path
            method: method
            requestId: requestId
            logCategory: logCategory
            event: event
            userId: userId
            outcome: outcome
      - labels:
          level:
      - labeldrop:
          - filename
