# CRM uygulama stack — API + Web (Postgres varsayılan olarak host’ta kalır).
#
# ÖNEMLİ — Web imajı build-arg: `env_file: .env.app` sadece container çalışma anına uygulanır;
# `docker compose build` içindeki ${NEXT_PUBLIC_API_URL} için proje ortamı gerekir.
# Seçenekler (birini kullanın):
#   A) Repo kökünden: docker compose -f infra/app/docker-compose.app.yml --env-file infra/app/.env.app up -d --build
#   B) infra/app/.env dosyası oluşturun (compose bu dosyayı otomatik okur — compose dosyasıyla aynı klasör)
#   C) API_PORT ile hizalama: NEXT_PUBLIC set değilse http://localhost:${API_PORT}/api/v1 kullanılır
#
# Kullanım (repo kökünden, A):
#   cp infra/app/.env.app.example infra/app/.env.app
#   # .env.app: DATABASE_URL host.docker.internal; API_PORT ve NEXT_PUBLIC_API_URL tutarlı olsun
#   docker compose -f infra/app/docker-compose.app.yml --env-file infra/app/.env.app up -d --build
#
# Migration (host’tan, aynı DATABASE_URL ile): apps/api içinde npx prisma migrate deploy
# Monitoring: crm-monitoring ayrı compose; API/Web portları host’a publish edildiği sürece mevcut blackbox hedefleri çalışır.

name: crm-app

services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    ports:
      - "${API_PORT:-3001}:3001"
    env_file:
      - .env.app
    # DATABASE_URL: Postgres host'ta ise @host.docker.internal:5432 — localhost container içidir.
    environment:
      PORT: "3001"
      HOST: "0.0.0.0"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - api_uploads:/app/apps/api/uploads
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:${API_PORT:-3001}/api/v1}
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file:
      - .env.app
    depends_on:
      - api
    restart: unless-stopped

volumes:
  api_uploads:
