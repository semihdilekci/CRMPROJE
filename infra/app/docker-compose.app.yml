# CRM uygulama stack — API + Web (Postgres host’ta veya AWS RDS; `DATABASE_URL` → infra/app/.env.app).
#
# ÖNEMLİ — Web imajı build-arg: `env_file: .env.app` sadece container çalışma anına uygulanır;
# `docker compose build` içindeki ${NEXT_PUBLIC_API_URL} için proje ortamı gerekir.
# Seçenekler (birini kullanın):
#   A) Repo kökünden: docker compose -f infra/app/docker-compose.app.yml --env-file infra/app/.env.app up -d --build
#   B) infra/app/.env dosyası oluşturun (compose bu dosyayı otomatik okur — compose dosyasıyla aynı klasör)
#   C) API_PORT ile hizalama: NEXT_PUBLIC set değilse http://localhost:${API_PORT}/api/v1 kullanılır
#
# Kullanım (repo kökünden, A):
#   cp infra/app/.env.app.example infra/app/.env.app
#   # .env.app: DATABASE_URL — host PG: host.docker.internal | RDS: endpoint + ?sslmode=require
#   #         API_PORT ve NEXT_PUBLIC_API_URL tutarlı olsun
#   docker compose -f infra/app/docker-compose.app.yml --env-file infra/app/.env.app up -d --build
#
# Migration (DB’ye ağ erişimi olan ortamda, hedef DATABASE_URL ile): apps/api içinde npx prisma migrate deploy
# Monitoring: crm-monitoring ayrı compose; API/Web portları host’a publish edildiği sürece mevcut blackbox hedefleri çalışır.
# API JSON dosya logu: host ./logs (repo kökü) ↔ konteyner /app/logs — Promtail aynı host yolunu okur (Faz 8).

name: crm-app

services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-}
        GIT_BRANCH: ${GIT_BRANCH:-}
    ports:
      - "${API_PORT:-3001}:3001"
    env_file:
      - .env.app
    # DATABASE_URL: host Postgres → host.docker.internal; RDS → endpoint hostname (localhost container içidir).
    environment:
      PORT: "3001"
      HOST: "0.0.0.0"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # İlk volume oluşturulduğunda izin: bkz. docs/deployment-and-env-strategy.md §1b (non-root / chown).
    volumes:
      - api_uploads:/app/apps/api/uploads
      - ../../logs:/app/logs
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:${API_PORT:-3001}/api/v1}
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file:
      - .env.app
    depends_on:
      - api
    restart: unless-stopped

volumes:
  api_uploads:
